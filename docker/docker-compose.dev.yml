# 开发环境专用配置
# 使用方式: docker compose -f docker/docker-compose.dev.yml --profile dev up -d

services:
  app:
    profiles:
      - dev

    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime

    container_name: voice-assistant-dev

    ports:
      - "8080:8080"
      - "8081:80"

    environment:
      - DEV_MODE=true
      - TZ=Asia/Shanghai

    volumes:
      # 后端源码挂载（不影响编译产物）
      - ../backend:/app/backend/source:rw
      # 后端配置目录挂载
      - ../backend/config:/app/backend/config:rw

    networks:
      - internal

  ui:
    image: node:20-alpine
    container_name: voiceassistant-ui-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "80:80"
    volumes:
      - ../frontend:/app:rw
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    networks:
      - internal

networks:
  internal:
    driver: bridge
