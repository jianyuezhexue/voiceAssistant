# 开发环境专用配置
# 使用方式: docker compose -f docker/docker-compose.dev.yml up

version: "3.8"

services:
  app:
    profiles:
      - dev

    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime

    container_name: voice-assistant-dev

    ports:
      - "80:80"
      - "8080:8080"
      - "5173:5173"

    environment:
      - DEV_MODE=true
      - TZ=Asia/Shanghai

    volumes:
      # 前端热更新
      - ../frontend:/app/frontend:rw
      - ../frontend/node_modules:/app/frontend/node_modules:rw

      # 后端热更新
      - ../backend:/app/backend:rw
      - /root/go/bin:/root/go/bin:rw

      # 日志
      - ./logs:/app/logs

    command: >
      sh -c "
        cd /app/frontend && npm install 2>/dev/null || true &&
        cd /app/backend && go install github.com/air-verse/air@latest 2>/dev/null || true &&
        /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
      "

    networks:
      - internal

  ui:
    image: voiceassistant-ui
    container_name: ui
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    ports:
      - "80:80"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
networks:
  internal:
    driver: bridge
