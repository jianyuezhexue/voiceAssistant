# 开发环境专用配置
# 使用方式: docker compose -f docker/docker-compose.dev.yml --profile dev up -d

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app

    container_name: voice-assistant-dev

    ports:
      - "8080:8080"
      - "8081:80"

    environment:
      - DEV_MODE=true
      - TZ=Asia/Shanghai
      # LLM 配置
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-your-api-key-here}
      - LLM_MODEL=qwen-plus
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      # WebRTC 配置
      - STUN_SERVER=stun:stun.l.google.com:19302
      - TURN_SERVER=${TURN_SERVER:-}

    volumes:
      # 后端源码挂载（不影响编译产物）
      - ../backend:/app/backend/source:rw
      # 后端配置目录挂载
      - ../backend/config:/app/backend/config:rw

    depends_on:
      - redis

    networks:
      - internal

  ui:
    image: node:20-alpine
    container_name: voiceassistant-ui-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "80:80"
    volumes:
      - ../frontend:/app:rw
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      # 后端 API 地址（容器内部访问）
      - VITE_API_BASE_URL=http://app:8080
      - VITE_WS_URL=ws://app:8080
    depends_on:
      - app
    networks:
      - internal
  redis:
    image: redis:7-alpine
    container_name: voiceassistant-redis-dev
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
