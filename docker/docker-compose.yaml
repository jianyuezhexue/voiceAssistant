# 生产环境：前端 Node + 后端 Go 双容器
# 用法：cd docker && docker-compose up -d --build
# 浏览器：http://localhost:2501
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: voiceassistant-backend
    ports:
      - "2500:2500"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: voiceassistant-frontend
    ports:
      - "2501:2501"
    depends_on:
      - backend
    restart: unless-stopped
