# 生产环境：前后端一体化单容器 + Redis
# 用法：cd docker && docker-compose up -d --build
# 浏览器：http://localhost
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: voiceassistant-app
    ports:
      - "2500:2500"          # 浏览器 http://localhost → 容器 2500
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "2500"
      REDIS_ADDRESS: redis:6379
    restart: unless-stopped