# 生产环境：前端 Node + 后端 Go 双容器
# 用法：cd docker && docker-compose up -d --build
# 浏览器：http://localhost:2501
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: voiceassistant-backend
    ports:
      - "2500:2500"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: voiceassistant-frontend
    ports:
      - "2501:2501"
    # 正式证书：取消下面注释，把证书放到 ./certs/ 目录
    # environment:
    #   TLS_CERT_FILE: /certs/fullchain.pem
    #   TLS_KEY_FILE: /certs/privkey.pem
    # volumes:
    #   - ./certs:/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
