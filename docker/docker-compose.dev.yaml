# 本地开发环境：前后端独立容器 + 热重载
# 用法：cd docker && docker-compose -f docker-compose.dev.yaml up
# 浏览器：http://localhost:2501 （vite dev，HMR；/api 与 /ws 代理到 app:2500）
services:
  ui:
    image: node:20-alpine
    container_name: voiceassistant-ui-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 2501"
    ports:
      - "2501:2501"
    environment:
      VITE_API_TARGET: http://app:2500
    volumes:
      - ../ui:/app
      - /app/node_modules   # 匿名卷，隔离宿主 node_modules
    depends_on:
      - app

  app:
    image: golang:1.25-alpine
    container_name: voiceassistant-app-dev
    working_dir: /app
    command: go run -mod=vendor .
    ports:
      - "2500:2500"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "2500"
    volumes:
      - ../app:/app
