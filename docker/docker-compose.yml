# ===========================
# VoiceAssistant Docker Compose
# ===========================

services:
  app:
    image: voiceassistant-app
    container_name: app
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    image: voiceassistant-ui
    container_name: ui
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    ports:
      - "80:80"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
